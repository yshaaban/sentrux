[plugin]
name = "vue"
display_name = "Vue"
version = "0.2.0"
extensions = ["vue"]
min_sentrux_version = "0.4.0"
color_rgb = [65, 184, 131]

[plugin.metadata]
author = "sentrux"
license = "MIT"

[grammar]
source = "https://github.com/tree-sitter-grammars/tree-sitter-vue"
ref = "master"
abi_version = 14

[queries]
capabilities = ["functions"]

[checksums]

[semantics]
is_executable = false
import_extractor = ""

[semantics.project]
manifest_files = ["package.json"]
ignored_dirs = ["node_modules", "dist"]

[semantics.resolver]
alias_file = "package.json"
alias_field = "name"
source_root = "src"
