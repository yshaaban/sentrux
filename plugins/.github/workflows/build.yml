name: Build Plugin Grammars

on:
  push:
    branches: [main]
    paths:
      - '*/plugin.toml'
      - '*/queries/**'
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin name to build (leave empty for all)'
        required: false

permissions:
  contents: write

jobs:
  detect-plugins:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.detect.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          if [ -n "${{ inputs.plugin }}" ]; then
            echo "plugins=[\"${{ inputs.plugin }}\"]" >> "$GITHUB_OUTPUT"
          else
            # Find all directories with plugin.toml
            plugins=$(find . -name plugin.toml -maxdepth 2 | sed 's|./||;s|/plugin.toml||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "plugins=$plugins" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect-plugins
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.detect-plugins.outputs.plugins) }}
        os: [macos-latest, ubuntu-latest]
        include:
          - os: macos-latest
            platform: darwin-arm64
            ext: dylib
            cc_flags: "-arch arm64"
          - os: ubuntu-latest
            platform: linux-x86_64
            ext: so
            cc_flags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Check if grammar exists
        id: check
        run: |
          if grep -q '\[grammar\]' "${{ matrix.plugin }}/plugin.toml"; then
            echo "has_grammar=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_grammar=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${{ matrix.plugin }} — no [grammar] section (display-only plugin)"
          fi

      - name: Read grammar source
        if: steps.check.outputs.has_grammar == 'true'
        id: grammar
        run: |
          source=$(grep 'source = ' ${{ matrix.plugin }}/plugin.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          ref=$(grep 'ref = ' ${{ matrix.plugin }}/plugin.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "source=$source" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Clone grammar source
        if: steps.check.outputs.has_grammar == 'true'
        run: |
          git clone --depth 1 --branch "${{ steps.grammar.outputs.ref }}" \
            "${{ steps.grammar.outputs.source }}" grammar-src || \
          git clone --depth 1 "${{ steps.grammar.outputs.source }}" grammar-src

      - name: Build grammar
        if: steps.check.outputs.has_grammar == 'true'
        run: |
          WORK_DIR="$(pwd)"
          cd grammar-src

          # Auto-detect grammar subdirectory:
          # Some repos put grammar.js in a subdir (fsharp/grammar.js, grammars/ocaml/grammar.js)
          GRAMMAR_DIR="."
          if [ ! -f grammar.js ]; then
            # Try plugin name as subdir (fsharp/, ocaml/)
            PLUGIN="${{ matrix.plugin }}"
            if [ -f "$PLUGIN/grammar.js" ]; then
              GRAMMAR_DIR="$PLUGIN"
            elif [ -f "grammars/$PLUGIN/grammar.js" ]; then
              GRAMMAR_DIR="grammars/$PLUGIN"
            else
              # Search for grammar.js anywhere
              FOUND=$(find . -name grammar.js -maxdepth 3 | head -1)
              if [ -n "$FOUND" ]; then
                GRAMMAR_DIR=$(dirname "$FOUND")
              fi
            fi
          fi

          echo "Grammar dir: $GRAMMAR_DIR"
          cd "$GRAMMAR_DIR"

          # Generate parser from grammar.js (some grammars are pre-generated)
          tree-sitter generate || true

          # Find src directory
          SRC_DIR="src"
          if [ ! -f "$SRC_DIR/parser.c" ]; then
            # Some grammars use subdirectories (typescript/src, php_only/src)
            for sub in */src; do
              if [ -f "$sub/parser.c" ]; then
                SRC_DIR="$sub"
                break
              fi
            done
          fi

          if [ ! -f "$SRC_DIR/parser.c" ]; then
            echo "::error::parser.c not found in $SRC_DIR"
            exit 1
          fi

          # Compile parser.c as C — suppress warnings on AUTO-GENERATED code only.
          # parser.c is produced by `tree-sitter generate` and may trigger
          # pedantic warnings across GCC/Clang versions. This is standard
          # practice (Neovim, Helix, Zed all suppress warnings on generated parsers).
          OBJECTS=""
          cc -c -fPIC -O2 -w ${{ matrix.cc_flags }} \
            -I "$SRC_DIR" \
            "$SRC_DIR/parser.c" -o parser.o
          OBJECTS="parser.o"

          # Optional C scanner — human-written code, warnings enabled
          if [ -f "$SRC_DIR/scanner.c" ]; then
            cc -c -fPIC -O2 -Wall ${{ matrix.cc_flags }} \
              -I "$SRC_DIR" \
              "$SRC_DIR/scanner.c" -o scanner.o
            OBJECTS="$OBJECTS scanner.o"
          fi

          # C++ scanner — human-written code, warnings enabled
          if [ -f "$SRC_DIR/scanner.cc" ]; then
            c++ -c -fPIC -O2 -Wall ${{ matrix.cc_flags }} \
              -I "$SRC_DIR" \
              "$SRC_DIR/scanner.cc" -o scanner_cc.o
            OBJECTS="$OBJECTS scanner_cc.o"
            # Link with C++ linker when C++ objects present
            c++ -shared ${{ matrix.cc_flags }} $OBJECTS -o "$WORK_DIR/grammar.${{ matrix.ext }}"
          else
            cc -shared ${{ matrix.cc_flags }} $OBJECTS -o "$WORK_DIR/grammar.${{ matrix.ext }}"
          fi

      - name: Upload artifact
        if: steps.check.outputs.has_grammar == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin }}-${{ matrix.platform }}
          path: grammar.${{ matrix.ext }}

  package:
    needs: [detect-plugins, build]
    if: always() && needs.detect-plugins.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: ${{ fromJSON(needs.detect-plugins.outputs.plugins) }}

    steps:
      - uses: actions/checkout@v4

      - name: Check if grammar exists
        id: check
        run: |
          if grep -q '\[grammar\]' "${{ matrix.plugin }}/plugin.toml"; then
            echo "has_grammar=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_grammar=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${{ matrix.plugin }} — display-only plugin"
          fi

      - name: Download all platform builds
        if: steps.check.outputs.has_grammar == 'true'
        continue-on-error: true
        id: download
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.plugin }}-*

      - name: Read version
        if: steps.check.outputs.has_grammar == 'true' && steps.download.outcome == 'success'
        id: version
        run: |
          version=$(grep 'version = ' ${{ matrix.plugin }}/plugin.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package per platform
        if: steps.check.outputs.has_grammar == 'true' && steps.download.outcome == 'success'
        run: |
          for platform_dir in ${{ matrix.plugin }}-*/; do
            platform=$(echo "$platform_dir" | sed "s/${{ matrix.plugin }}-//;s|/||")
            mkdir -p "pkg-${platform}/${{ matrix.plugin }}/grammars"
            mkdir -p "pkg-${platform}/${{ matrix.plugin }}/queries"

            # Copy grammar binary with correct name
            if [ -f "${platform_dir}/grammar.dylib" ]; then
              cp "${platform_dir}/grammar.dylib" "pkg-${platform}/${{ matrix.plugin }}/grammars/${platform}.dylib"
            elif [ -f "${platform_dir}/grammar.so" ]; then
              cp "${platform_dir}/grammar.so" "pkg-${platform}/${{ matrix.plugin }}/grammars/${platform}.so"
            fi

            # Copy plugin.toml and queries
            cp "${{ matrix.plugin }}/plugin.toml" "pkg-${platform}/${{ matrix.plugin }}/"
            cp "${{ matrix.plugin }}/queries/"* "pkg-${platform}/${{ matrix.plugin }}/queries/"

            # Create tarball
            cd "pkg-${platform}"
            tar czf "../${{ matrix.plugin }}-${platform}.tar.gz" "${{ matrix.plugin }}/"
            cd ..
          done

      - name: Compute checksums
        if: steps.check.outputs.has_grammar == 'true' && steps.download.outcome == 'success'
        run: |
          for f in ${{ matrix.plugin }}-*.tar.gz; do
            sha256sum "$f"
          done

      - name: Create release
        if: steps.check.outputs.has_grammar == 'true' && steps.download.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.plugin }}-v${{ steps.version.outputs.version }}
          name: "${{ matrix.plugin }} v${{ steps.version.outputs.version }}"
          files: ${{ matrix.plugin }}-*.tar.gz
          body: |
            Language plugin: **${{ matrix.plugin }}** v${{ steps.version.outputs.version }}

            Install: `sentrux plugin add ${{ matrix.plugin }}`

            Or manually download and extract to `~/.sentrux/plugins/${{ matrix.plugin }}/`
