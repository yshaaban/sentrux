# Sentrux Plugin Registry
# `sentrux plugin add <name>` reads this to find download URLs.

[registry]
version = 1

# Standard languages (shipped with sentrux via `sentrux plugin add-standard`)
standard = [
  "python", "javascript", "typescript", "rust", "go",
  "c", "cpp", "java", "ruby", "csharp", "php", "bash",
  "html", "css", "scss", "swift", "lua", "scala",
  "elixir", "haskell", "zig", "r", "ocaml"
]

# All available plugins
[[plugins]]
name = "python"
version = "0.1.0"
display_name = "Python"
extensions = ["py"]

[[plugins]]
name = "javascript"
version = "0.1.0"
display_name = "JavaScript"
extensions = ["js", "mjs", "cjs", "jsx"]

[[plugins]]
name = "typescript"
version = "0.1.0"
display_name = "TypeScript"
extensions = ["ts", "mts", "cts", "tsx"]

[[plugins]]
name = "rust"
version = "0.1.0"
display_name = "Rust"
extensions = ["rs"]

[[plugins]]
name = "go"
version = "0.1.0"
display_name = "Go"
extensions = ["go"]

[[plugins]]
name = "c"
version = "0.1.0"
display_name = "C"
extensions = ["c", "h"]

[[plugins]]
name = "cpp"
version = "0.1.0"
display_name = "C++"
extensions = ["cpp", "cc", "cxx", "hpp", "hh", "hxx"]

[[plugins]]
name = "java"
version = "0.1.0"
