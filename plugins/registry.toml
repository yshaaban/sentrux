[[plugins]]
name = "php"
version = "0.1.0"
display_name = "PHP"
extensions = ["php"]

[[plugins]]
name = "bash"
version = "0.1.0"
display_name = "Bash"
extensions = ["sh", "bash"]

[[plugins]]
name = "html"
version = "0.1.0"
display_name = "HTML"
