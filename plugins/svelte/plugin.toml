[plugin]
name = "svelte"
display_name = "Svelte"
version = "0.2.0"
extensions = ["svelte"]
min_sentrux_version = "0.4.0"
color_rgb = [255, 62, 0]

[plugin.metadata]
author = "sentrux"
license = "MIT"

[grammar]
source = "https://github.com/tree-sitter-grammars/tree-sitter-svelte"
ref = "master"
abi_version = 14

[queries]
capabilities = ["functions"]

[checksums]

[semantics]
is_executable = false
import_extractor = ""

[semantics.project]
manifest_files = ["package.json"]
ignored_dirs = ["node_modules", ".svelte-kit", "build"]

[semantics.resolver]
alias_file = "package.json"
alias_field = "name"
source_root = "src"
