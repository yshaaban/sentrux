[plugin]
name = "protobuf"
display_name = "Protocol Buffers"
version = "0.2.0"
extensions = ["proto"]
min_sentrux_version = "0.4.0"
color_rgb = [60, 60, 60]

[plugin.metadata]
author = "sentrux"
license = "MIT"

[grammar]
source = "https://github.com/90-008/tree-sitter-protobuf"
ref = "5aef38d655f76a6b0d172340eed3766c93b3124c"
abi_version = 14

[queries]
capabilities = ["classes", "imports"]

[checksums]

[semantics]
is_executable = false
import_extractor = ""
