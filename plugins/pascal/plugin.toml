[plugin]
name = "pascal"
display_name = "Object Pascal"
version = "0.1.0"
extensions = ["pas", "dpr", "dpk", "pp", "lpr"]
min_sentrux_version = "0.5.0"
color_rgb = [200, 50, 50]

[plugin.metadata]
author = "sentrux"
license = "MIT"

[grammar]
source = "https://github.com/Isopod/tree-sitter-pascal"
ref = "master"
abi_version = 14

[queries]
capabilities = ["functions", "classes", "imports"]

[checksums]

[semantics]
is_executable = true
base_class_extractor = "generic"
public_keywords = ["public", "published"]
main_filenames = ["project1.dpr", "project1.lpr"]
test_prefixes = ["test_"]
test_suffixes = ["_test.pas", "tests.pas"]

[semantics.project]
manifest_files = ["*.dpr", "*.dproj", "*.lpi"]
source_dirs = ["src", "source", "Source"]
ignored_dirs = ["__history", "__recovery", "DCU", "dcu", "lib"]

[semantics.import_ast]
strategy = "field_read"
module_path_field = ""
module_path_node_kinds = ["moduleName"]
string_content_kind = ""
child_import_kind = ""

[semantics.complexity]
branch_nodes = ["if", "for", "foreach", "while", "repeat", "caseCase", "exceptionHandler"]
logic_nodes = ["exprBinary"]
logic_operators = ["and", "or"]
nesting_nodes = ["if", "for", "foreach", "while", "repeat", "caseCase", "try"]

[semantics.complexity_keywords]
cc = ["if ", "else if", "for ", "while ", "repeat ", "case ", "except ", " and ", " or "]
cog_branch = ["if ", "else if", "for ", "while ", "repeat ", "case ", "except "]
