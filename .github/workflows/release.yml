name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
            target: aarch64-apple-darwin
            artifact: sentrux-darwin-arm64
            smoke_mode: native
          - os: ubuntu-22.04
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            artifact: sentrux-linux-x86_64
            smoke_mode: native
          - os: ubuntu-22.04
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
            artifact: sentrux-linux-aarch64
            smoke_mode: arm64-container

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            # Add arm64 architecture for cross-compilation packages
            sudo dpkg --add-architecture arm64
            sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe" | sudo tee /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            sudo apt-get update
            sudo apt-get install -y gcc-aarch64-linux-gnu \
              libssl-dev:arm64 \
              libglib2.0-dev:arm64 \
              libgtk-3-dev:arm64 \
              libxcb-render0-dev:arm64 \
              libxcb-shape0-dev:arm64 \
              libxcb-xfixes0-dev:arm64 \
              libxkbcommon-dev:arm64 || \
            sudo apt-get install -y gcc-aarch64-linux-gnu
          else
            sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
              libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libvulkan-dev
          fi

      - name: Cache tree-sitter CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/tree-sitter-cli
          key: ${{ runner.os }}-tree-sitter-cli-0.25.10

      - name: Install tree-sitter CLI
        shell: bash
        env:
          TREE_SITTER_CLI_VERSION: '0.25.10'
        run: |
          chmod +x scripts/install_tree_sitter_cli.sh
          ./scripts/install_tree_sitter_cli.sh

      - name: Set cross-compilation linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "[target.aarch64-unknown-linux-gnu]" >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV
          echo "OPENSSL_DIR=/usr" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --locked -p sentrux --target-dir target --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/sentrux ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Setup QEMU for arm64 smoke
        if: matrix.smoke_mode == 'arm64-container'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Smoke test install.sh (native)
        if: matrix.smoke_mode == 'native'
        shell: bash
        run: |
          chmod +x scripts/smoke_test_install.sh
          ./scripts/smoke_test_install.sh \
            --artifact-path "${{ matrix.artifact }}" \
            --artifact-name "${{ matrix.artifact }}"

      - name: Smoke test install.sh (arm64 container)
        if: matrix.smoke_mode == 'arm64-container'
        shell: bash
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/work" \
            -w /work \
            ubuntu:22.04 \
            bash -lc '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update >/dev/null
              apt-get install -y \
                bash \
                curl \
                python3 \
                libgtk-3-0 \
                libxcb-render0 \
                libxcb-shape0 \
                libxcb-xfixes0 \
                libxkbcommon0 \
                libssl3 \
                libvulkan1 >/dev/null
              chmod +x install.sh scripts/smoke_test_install.sh
              ./scripts/smoke_test_install.sh \
                --artifact-path "/work/${{ matrix.artifact }}" \
                --artifact-name "${{ matrix.artifact }}"
            '

      - name: Build grammar bundle
        shell: bash
        run: |
          chmod +x scripts/build_grammar_bundle.sh
          ./scripts/build_grammar_bundle.sh \
            --platform "${{ matrix.platform }}" \
            --output "grammars-${{ matrix.platform }}.tar.gz"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload grammar artifact
        uses: actions/upload-artifact@v4
        with:
          name: grammars-${{ matrix.platform }}
          path: grammars-${{ matrix.platform }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            sentrux-darwin-arm64/sentrux-darwin-arm64
            sentrux-linux-x86_64/sentrux-linux-x86_64
            sentrux-linux-aarch64/sentrux-linux-aarch64
            grammars-darwin-arm64/grammars-darwin-arm64.tar.gz
            grammars-linux-x86_64/grammars-linux-x86_64.tar.gz
            grammars-linux-aarch64/grammars-linux-aarch64.tar.gz
          generate_release_notes: true
