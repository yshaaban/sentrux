name: Build Grammar Bundles

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
          - os: ubuntu-22.04
            platform: linux-x86_64
          - os: ubuntu-22.04
            platform: linux-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: build-grammars-${{ runner.os }}-cargo

      - name: Install cross-compiler (ARM64)
        if: matrix.platform == 'linux-aarch64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache tree-sitter CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/tree-sitter-cli
          key: ${{ runner.os }}-tree-sitter-cli-0.25.10

      - name: Install tree-sitter CLI
        shell: bash
        env:
          TREE_SITTER_CLI_VERSION: '0.25.10'
        run: |
          chmod +x scripts/install_tree_sitter_cli.sh
          ./scripts/install_tree_sitter_cli.sh

      - name: Build grammar bundle
        shell: bash
        run: |
          chmod +x scripts/build_grammar_bundle.sh
          ./scripts/build_grammar_bundle.sh \
            --platform "${{ matrix.platform }}" \
            --output "grammars-${{ matrix.platform }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grammars-${{ matrix.platform }}
          path: grammars-${{ matrix.platform }}.tar.gz
