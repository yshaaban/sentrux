name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
          - os: ubuntu-22.04
            platform: linux-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check public release hygiene
        run: node scripts/check_public_release_hygiene.mjs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libvulkan-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Build and install current-commit language grammars
        shell: bash
        run: |
          chmod +x scripts/build_grammar_bundle.sh
          ./scripts/build_grammar_bundle.sh \
            --platform "${{ matrix.platform }}" \
            --output /tmp/grammars.tar.gz
          mkdir -p ~/.sentrux/plugins
          tar xzf /tmp/grammars.tar.gz -C ~/.sentrux/plugins/
          SENTRUX_SKIP_GRAMMAR_DOWNLOAD=1 cargo run -p sentrux -- --version || true

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Test ts-bridge
        run: |
          npm ci --prefix ts-bridge
          npm --prefix ts-bridge test

      - name: Test public release hygiene helpers
        run: node --test scripts/tests/public-release-hygiene.test.mjs

      - name: Build release
        run: cargo build --release -p sentrux

      - name: Smoke test install.sh
        shell: bash
        run: |
          chmod +x scripts/smoke_test_install.sh
          if [ "${{ runner.os }}" = "macOS" ]; then
            ARTIFACT_NAME="sentrux-darwin-arm64"
          else
            ARTIFACT_NAME="sentrux-linux-x86_64"
          fi
          ./scripts/smoke_test_install.sh \
            --artifact-path target/release/sentrux \
            --artifact-name "${ARTIFACT_NAME}"
