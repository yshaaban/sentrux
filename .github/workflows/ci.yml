name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libvulkan-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build
        env:
          # tree-sitter grammar crates pull in two versions of tree-sitter
          # (0.20 and 0.25) with duplicate C symbols. Allow on Linux.
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-Clink-args=-Wl,--allow-multiple-definition' || '' }}

      - name: Test
        run: cargo test
        env:
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-Clinker=gcc' || '' }}

      - name: Build release
        run: cargo build --release
        env:
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-Clinker=gcc' || '' }}
