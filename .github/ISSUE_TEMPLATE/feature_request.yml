name: Feature request
description: Propose a focused improvement for public users of Sentrux.
title: "[feature] "
labels:
  - enhancement
body:
  - type: checkboxes
    id: hygiene
    attributes:
      label: Before submitting
      options:
        - label: I checked that this is not already requested.
          required: true
        - label: I kept the request public-safe and free of private roadmap details.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is hard, confusing, or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link examples, measurements, user reports, or prior art if you have them.
