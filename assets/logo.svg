<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- sentrux — Entropy Arrow icon: ░▒▓██ — chaos → order -->
  <!-- 4col × 5row pixel grid per block, 3×3 pixels, 4px pitch -->

  <!-- ░ (25%) -->
  <rect x="5" y="4" width="3" height="3" fill="#00d4aa"/>
  <rect x="9" y="8" width="3" height="3" fill="#00d4aa"/>
  <rect x="1" y="12" width="3" height="3" fill="#00d4aa"/>
  <rect x="9" y="16" width="3" height="3" fill="#00d4aa"/>
  <rect x="5" y="20" width="3" height="3" fill="#00d4aa"/>

  <!-- ▒ (50%) -->
  <rect x="14" y="4" width="3" height="3" fill="#00d4aa"/>
  <rect x="22" y="4" width="3" height="3" fill="#00d4aa"/>
  <rect x="18" y="8" width="3" height="3" fill="#00d4aa"/>
  <rect x="14" y="12" width="3" height="3" fill="#00d4aa"/>
  <rect x="22" y="12" width="3" height="3" fill="#00d4aa"/>
  <rect x="18" y="16" width="3" height="3" fill="#00d4aa"/>
  <rect x="14" y="20" width="3" height="3" fill="#00d4aa"/>
  <rect x="22" y="20" width="3" height="3" fill="#00d4aa"/>

  <!-- ▓ (75%) -->
  <rect x="27" y="4" width="3" height="3" fill="#00d4aa"/>
  <rect x="31" y="4" width="3" height="3" fill="#00d4aa"/>
  <rect x="27" y="8" width="3" height="3" fill="#00d4aa"/>
  <rect x="35" y="8" width="3" height="3" fill="#00d4aa"/>
  <rect x="27" y="12" width="3" height="3" fill="#00d4aa"/>
  <rect x="31" y="12" width="3" height="3" fill="#00d4aa"/>
  <rect x="35" y="12" width="3" height="3" fill="#00d4aa"/>
  <rect x="31" y="16" width="3" height="3" fill="#00d4aa"/>
  <rect x="35" y="16" width="3" height="3" fill="#00d4aa"/>
  <rect x="27" y="20" width="3" height="3" fill="#00d4aa"/>
  <rect x="31" y="20" width="3" height="3" fill="#00d4aa"/>
  <rect x="35" y="20" width="3" height="3" fill="#00d4aa"/>

  <!-- █ (100%) solid -->
  <rect x="40" y="4" width="7" height="19" fill="#00d4aa"/>

  <!-- Bottom bar — grounding line -->
  <rect x="1" y="28" width="46" height="3" fill="#00d4aa" opacity="0.15"/>
  <rect x="1" y="33" width="46" height="3" fill="#00d4aa" opacity="0.08"/>

  <!-- Grade indicator -->
  <rect x="40" y="38" width="7" height="7" fill="#00d4aa" opacity="0.4"/>
</svg>
